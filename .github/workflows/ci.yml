name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run ci:check

  smoke-pack:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run packed tarball smoke test
        run: npm run smoke:pack

  determinism-matrix:
    runs-on: ${{ matrix.os }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Generate determinism report
        run: node scripts/determinism-report.mjs

      - name: Upload determinism report
        uses: actions/upload-artifact@v4
        with:
          name: determinism-${{ matrix.os }}
          path: determinism-report.json

  determinism-compare:
    runs-on: ubuntu-latest
    needs: determinism-matrix
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download determinism reports
        uses: actions/download-artifact@v4
        with:
          path: determinism-reports
          pattern: determinism-*

      - name: Compare determinism reports
        run: node scripts/compare-determinism-reports.mjs determinism-reports
